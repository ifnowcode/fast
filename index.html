<!-- https://en.wikipedia.org/wiki/Go_(game) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--Go (9x9 with AI)-->
  <title>⚪️ Fast</title>
  <style>
    body {
      background: #222;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 10px;
    }
    canvas {
      background: #c9a26b;
      border: 4px solid #000;
      margin-bottom: 10px;
    }
    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="passBtn">Pass</button>
    <button id="resetBtn">Reset</button>
    <span id="status"></span>
  </div>
  <canvas id="board" width="540" height="540"></canvas>

  <script src="fast.js"></script>
</body>
</html>
